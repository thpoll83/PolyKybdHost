# Microsoft Outlook shortcut overlays for PolyKybd.
#
# Icons: Microsoft Fluent UI System Icons (MIT). Program icon (ESC): a generic
# drawn mark (no MS logo). Shortcuts: Outlook defaults (note: Ctrl+F = Forward,
# Ctrl+E = Search). See SOURCES.md.
#
# Regenerate:
#   python polyhost/res/overlay_sources/outlook/fetch_icons.py
#   python scripts/generate_app_overlays.py \
#       polyhost/res/overlay_sources/outlook/bindings.yaml --preview /tmp/outlook_preview
app: outlook
match: [outlook]              # confirm vs the active-window name (outlook / OUTLOOK.EXE)
output: outlook_template
icon_dir: icons
fit: contain
anchor: bottom-right
region: [40, 36]
margin: 0
mode: luma
threshold: 150

program_icon: outlook.png     # generic drawn mark (see fetch_icons._draw_outlook_logo)
program_icon_mode: alpha
program_icon_anchor: bottom-right
program_icon_region: [46, 40]
program_icon_margin: 0

bindings:
  # --- mail actions (Ctrl -> R channel of primary) ---
  - { key: N, mods: [CTRL], icon: new.png,     label: "New mail", source: "ms-fluent/Mail Add (MIT)" }
  - { key: R, mods: [CTRL], icon: reply.png,   label: Reply,      source: "ms-fluent/Arrow Reply (MIT)" }
  - { key: F, mods: [CTRL], icon: forward.png, label: Forward,    source: "ms-fluent/Arrow Forward (MIT)" }
  - { key: ENTER, mods: [CTRL], icon: send.png, label: Send,      source: "ms-fluent/Send (MIT)" }
  - { key: P, mods: [CTRL], icon: print.png,   label: Print,      source: "ms-fluent/Print (MIT)" }
  - { key: S, mods: [CTRL], icon: save.png,    label: Save,       source: "ms-fluent/Save (MIT)" }
  - { key: E, mods: [CTRL], icon: search.png,  label: Search,     source: "ms-fluent/Search (MIT)" }
  - { key: Q, mods: [CTRL], icon: markread.png,   label: "Mark read",   source: "ms-fluent/Mail Read (MIT)" }
  - { key: U, mods: [CTRL], icon: markunread.png, label: "Mark unread", source: "ms-fluent/Mail Unread (MIT)" }
  - { key: K, mods: [CTRL], icon: hyperlink.png,  label: Hyperlink,     source: "ms-fluent/Link (MIT)" }
  - { key: B, mods: [CTRL], icon: bold.png,    label: Bold,   source: "ms-fluent/Text Bold (MIT)" }
  - { key: I, mods: [CTRL], icon: italic.png,  label: Italic, source: "ms-fluent/Text Italic (MIT)" }

  # --- module switch (Ctrl + number) ---
  - { key: "1", mods: [CTRL], icon: mailview.png,   label: Mail,     source: "ms-fluent/Mail Inbox (MIT)" }
  - { key: "2", mods: [CTRL], icon: calview.png,    label: Calendar, source: "ms-fluent/Calendar (MIT)" }
  - { key: "3", mods: [CTRL], icon: peopleview.png, label: People,   source: "ms-fluent/People (MIT)" }
  - { key: "4", mods: [CTRL], icon: tasksview.png,  label: Tasks,    source: "ms-fluent/Tasks App (MIT)" }
  - { key: "5", mods: [CTRL], icon: notes.png,      label: Notes,    source: "ms-fluent/Note (MIT)" }
  - { key: "6", mods: [CTRL], icon: folderlist.png, label: "Folder list", source: "ms-fluent/Apps List (MIT)" }
  - { key: "7", mods: [CTRL], icon: shortcuts.png,  label: Shortcuts, source: "ms-fluent/Star (MIT)" }

  # --- navigation (Ctrl) ---
  - { key: G, mods: [CTRL],     icon: gotodate.png, label: "Go to date", source: "ms-fluent/Calendar Arrow Right (MIT)" }
  - { key: DOT, mods: [CTRL],   icon: nextmsg.png,  label: "Next msg",   source: "ms-fluent/Arrow Down (MIT)" }
  - { key: COMMA, mods: [CTRL], icon: prevmsg.png,  label: "Prev msg",   source: "ms-fluent/Arrow Up (MIT)" }
  # Compose-window (Word engine) formatting:
  - { key: T, mods: [CTRL],     icon: hangindent.png, label: "Hang indent", source: "ms-fluent/Text Indent Increase (MIT)" }
  - { key: MINUS, mods: [CTRL], icon: hyphen.png,     label: "Opt hyphen",  source: "ms-fluent/Subtract (MIT)" }

  # --- Ctrl+Shift -> R channel of combo ---
  - { key: R, mods: [CTRL, SHIFT], icon: replyall.png,   label: "Reply all",  source: "ms-fluent/Arrow Reply All (MIT)" }
  - { key: A, mods: [CTRL, SHIFT], icon: newappt.png,    label: "New appt",   source: "ms-fluent/Calendar Add (MIT)" }
  - { key: C, mods: [CTRL, SHIFT], icon: newcontact.png, label: "New contact", source: "ms-fluent/Person Add (MIT)" }
  - { key: K, mods: [CTRL, SHIFT], icon: newtask.png,    label: "New task",   source: "ms-fluent/Task List Add (MIT)" }
  - { key: G, mods: [CTRL, SHIFT], icon: flag.png,       label: Flag,         source: "ms-fluent/Flag (MIT)" }

  # --- plain keys (no-mod -> A channel) ---
  - { key: DELETE, mods: [], icon: delete.png,   label: Delete,     source: "ms-fluent/Delete (MIT)" }
  - { key: F9, mods: [],     icon: sendrecv.png, label: "Send/Recv", source: "ms-fluent/Arrow Sync (MIT)" }
