# Adobe Photoshop shortcut overlays for PolyKybd.
#
# Icons: Microsoft Fluent UI System Icons (MIT) where a clean glyph exists; the
# signature Photoshop tools (marquee, lasso, magic wand, clone stamp, healing,
# dodge/burn, path-selection, swap/default colours, quick mask) are simple glyphs
# DRAWN in fetch_icons.py (mode: alpha). Program icon (ESC): a generic, license-
# clean rounded-square "Ps" monogram (NOT Adobe's logo). Shortcuts: Photoshop
# defaults. See SOURCES.md.
#
# Regenerate:
#   python polyhost/res/overlay_sources/photoshop/fetch_icons.py
#   python scripts/generate_app_overlays.py \
#       polyhost/res/overlay_sources/photoshop/bindings.yaml --preview /tmp/photoshop_preview
app: photoshop
match: [photoshop]              # confirm vs the active-window name (photoshop / Photoshop.exe)
output: photoshop_template
icon_dir: icons
fit: contain
anchor: bottom-right
region: [36, 32]
margin: 0
mode: luma
threshold: 150

program_icon: photoshop.png      # generic drawn "Ps" monogram (see fetch_icons._draw_ps_logo)
program_icon_mode: alpha         # white-on-transparent drawing: alpha is the shape
program_icon_anchor: bottom-right
program_icon_region: [42, 34]
program_icon_margin: 0

bindings:
  # ============================================================= #
  # TOOLS  (no-mod -> A channel of primary)                       #
  # ============================================================= #
  - { key: V, mods: [], icon: move.png,            label: "Move",            source: "ms-fluent/Arrow Move (MIT)" }
  - { key: M, mods: [], icon: marquee.png,  mode: alpha, label: "Marquee",   source: "custom (drawn: dashed rect)" }
  - { key: L, mods: [], icon: lasso.png,    mode: alpha, label: "Lasso",     source: "custom (drawn: loop + tail)" }
  - { key: W, mods: [], icon: magicwand.png, mode: alpha, label: "Quick-select / Magic wand", source: "custom (drawn: wand + sparkle)" }
  - { key: C, mods: [], icon: crop.png,            label: "Crop",            source: "ms-fluent/Crop (MIT)" }
  - { key: B, mods: [], icon: brush.png,           label: "Brush",           source: "ms-fluent/Paint Brush (MIT)" }
  - { key: E, mods: [], icon: eraser.png,          label: "Eraser",          source: "ms-fluent/Eraser (MIT)" }
  - { key: S, mods: [], icon: clonestamp.png, mode: alpha, label: "Clone stamp", source: "custom (drawn: rubber stamp)" }
  - { key: T, mods: [], icon: type.png,            label: "Type",            source: "ms-fluent/Text T (MIT)" }
  - { key: G, mods: [], icon: gradient.png, mode: alpha, label: "Gradient / Paint bucket", source: "custom (drawn: diagonal gradient swatch)" }
  - { key: I, mods: [], icon: eyedropper.png,      label: "Eyedropper",      source: "ms-fluent/Eyedropper (MIT)" }
  - { key: Z, mods: [], icon: zoom.png,            label: "Zoom",            source: "ms-fluent/Zoom In (MIT)" }
  - { key: H, mods: [], icon: hand.png,            label: "Hand",            source: "ms-fluent/Hand Right (MIT)" }
  - { key: P, mods: [], icon: pen.png,             label: "Pen",             source: "ms-fluent/Pen (MIT)" }
  - { key: U, mods: [], icon: shape.png,           label: "Shape",           source: "ms-fluent/Shapes (MIT)" }
  - { key: J, mods: [], icon: healing.png,  mode: alpha, label: "Healing brush", source: "custom (drawn: plaster)" }
  - { key: O, mods: [], icon: dodgeburn.png, mode: alpha, label: "Dodge / Burn", source: "custom (drawn: dodge lollipop)" }
  - { key: Y, mods: [], icon: historybrush.png,    label: "History brush",   source: "ms-fluent/History (MIT)" }
  - { key: A, mods: [], icon: pathselect.png, mode: alpha, label: "Path selection", source: "custom (drawn: arrow cursor)" }
  - { key: X, mods: [], icon: swapcolors.png, mode: alpha, label: "Swap FG/BG", source: "custom (drawn: two squares + swap arrow)" }
  - { key: D, mods: [], icon: defaultcolors.png, mode: alpha, label: "Default colours", source: "custom (drawn: B/W squares)" }
  - { key: Q, mods: [], icon: quickmask.png, mode: alpha, label: "Quick mask", source: "custom (drawn: masked rect)" }

  # ============================================================= #
  # CTRL  (-> R channel of primary)                              #
  # ============================================================= #
  # --- file ---
  - { key: N, mods: [CTRL], icon: new.png,    label: "New",    source: "ms-fluent/Document Add (MIT)" }
  - { key: O, mods: [CTRL], icon: open.png,   label: "Open",   source: "ms-fluent/Folder Open (MIT)" }
  - { key: S, mods: [CTRL], icon: save.png,   label: "Save",   source: "ms-fluent/Save (MIT)" }
  - { key: W, mods: [CTRL], icon: close.png,  label: "Close",  source: "ms-fluent/Document Dismiss (MIT)" }
  - { key: P, mods: [CTRL], icon: print.png,  label: "Print",  source: "ms-fluent/Print (MIT)" }
  # --- edit ---
  - { key: Z, mods: [CTRL], icon: undo.png,   label: "Undo",   source: "ms-fluent/Arrow Undo (MIT)" }
  - { key: C, mods: [CTRL], icon: copy.png,   label: "Copy",   source: "ms-fluent/Copy (MIT)" }
  - { key: X, mods: [CTRL], icon: cut.png,    label: "Cut",    source: "ms-fluent/Cut (MIT)" }
  - { key: V, mods: [CTRL], icon: paste.png,  label: "Paste",  source: "ms-fluent/Clipboard Paste (MIT)" }
  - { key: A, mods: [CTRL], icon: selectall.png, label: "Select all", source: "ms-fluent/Select All On (MIT)" }
  - { key: D, mods: [CTRL], icon: deselect.png,  label: "Deselect",   source: "ms-fluent/Select All Off (MIT)" }
  - { key: T, mods: [CTRL], icon: freetransform.png, label: "Free transform", source: "ms-fluent/Resize (MIT)" }
  # --- layer ---
  - { key: J, mods: [CTRL], icon: duplayer.png,  label: "Duplicate layer", source: "ms-fluent/Layer (MIT)" }
  - { key: E, mods: [CTRL], icon: mergedown.png, label: "Merge down",      source: "ms-fluent/Layer Diagonal (MIT)" }
  - { key: G, mods: [CTRL], icon: group.png,     label: "Group layers",    source: "ms-fluent/Group (MIT)" }
  # --- image adjustments ---
  - { key: L, mods: [CTRL], icon: levels.png,       label: "Levels",        source: "ms-fluent/Data Histogram (MIT)" }
  - { key: M, mods: [CTRL], icon: curves.png,       label: "Curves",        source: "ms-fluent/Data Line (MIT)" }
  - { key: U, mods: [CTRL], icon: huesat.png,       label: "Hue / Saturation", source: "ms-fluent/Color (MIT)" }
  - { key: B, mods: [CTRL], icon: colorbalance.png, label: "Color balance", source: "ms-fluent/Color Fill (MIT)" }
  - { key: I, mods: [CTRL], icon: invert.png,       label: "Invert",        source: "ms-fluent/Color Background (MIT)" }
  # --- view ---
  - { key: R, mods: [CTRL], icon: rulers.png, label: "Rulers",      source: "ms-fluent/Ruler (MIT)" }
  - { key: H, mods: [CTRL], icon: extras.png, label: "Hide extras", source: "ms-fluent/Eye Off (MIT)" }
  - { key: "0", mods: [CTRL], icon: fitscreen.png, label: "Fit on screen", source: "ms-fluent/Full Screen Maximize (MIT)" }
  - { key: EQUAL, mods: [CTRL], icon: zoomin.png,  label: "Zoom in",  source: "ms-fluent/Zoom In (MIT)" }
  - { key: MINUS, mods: [CTRL], icon: zoomout.png, label: "Zoom out", source: "ms-fluent/Zoom Out (MIT)" }

  # ============================================================= #
  # CTRL+SHIFT  (-> R channel of combo)                          #
  # ============================================================= #
  - { key: S, mods: [CTRL, SHIFT], icon: saveas.png,     label: "Save as",          source: "ms-fluent/Save Edit (MIT)" }
  - { key: N, mods: [CTRL, SHIFT], icon: newlayer.png,   label: "New layer",        source: "ms-fluent/Add Square (MIT)" }
  - { key: I, mods: [CTRL, SHIFT], icon: invertsel.png,  label: "Inverse selection", source: "ms-fluent/Arrow Swap (MIT)" }
  - { key: U, mods: [CTRL, SHIFT], icon: desaturate.png, label: "Desaturate",       source: "ms-fluent/Color Line (MIT)" }
  - { key: E, mods: [CTRL, SHIFT], icon: mergedown.png,  label: "Merge visible",    source: "ms-fluent/Layer Diagonal (MIT)" }
  - { key: Z, mods: [CTRL, SHIFT], icon: redo.png,       label: "Redo / Step fwd",  source: "ms-fluent/Arrow Redo (MIT)" }
  - { key: C, mods: [CTRL, SHIFT], icon: copymerged.png, label: "Copy merged",      source: "ms-fluent/Copy Select (MIT)" }

  # ============================================================= #
  # SHIFT  (-> B channel of primary)                             #
  # ============================================================= #
  - { key: F5, mods: [SHIFT], icon: fill.png, label: "Fill", source: "ms-fluent/Paint Bucket (MIT)" }
