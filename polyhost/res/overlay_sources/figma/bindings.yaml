# Figma (desktop) shortcut overlays for PolyKybd.
#
# Icons: Microsoft Fluent UI System Icons (MIT) + a few drawn glyphs (slice,
# frame-selection). Program icon (ESC): a generic license-clean rounded-square
# "F" mark drawn in code (NOT Figma's logo). Shortcuts: Figma Windows defaults
# (Ctrl == Cmd on macOS). See SOURCES.md.
#
# Regenerate:
#   python polyhost/res/overlay_sources/figma/fetch_icons.py
#   python scripts/generate_app_overlays.py \
#       polyhost/res/overlay_sources/figma/bindings.yaml --preview /tmp/figma_preview
app: figma
match: [figma]                  # confirm vs the active-window name (Figma / figma.exe)
output: figma_template
icon_dir: icons
fit: contain
anchor: bottom-right
region: [36, 32]
margin: 0
mode: luma
threshold: 150

program_icon: figma.png          # generic drawn mark (see fetch_icons._draw_figma_mark)
program_icon_mode: alpha          # white-on-transparent drawing: alpha is the shape
program_icon_anchor: bottom-right
program_icon_region: [46, 40]
program_icon_margin: 0

bindings:
  # --- tools (no-mod -> A channel) ---
  - { key: V, mods: [], icon: move.png,       label: Move,       source: "ms-fluent/Arrow Move (MIT)" }
  - { key: K, mods: [], icon: scale.png,      label: Scale,      source: "ms-fluent/Resize Large (MIT)" }
  - { key: F, mods: [], icon: frame.png,      label: Frame,      source: "ms-fluent/Frame (MIT)" }
  - { key: R, mods: [], icon: rectangle.png,  label: Rectangle,  source: "ms-fluent/Rectangle Landscape (MIT)" }
  - { key: O, mods: [], icon: ellipse.png,    label: Ellipse,    source: "ms-fluent/Circle (MIT)" }
  - { key: L, mods: [], icon: line.png,       label: Line,       source: "ms-fluent/Line (MIT)" }
  - { key: P, mods: [], icon: pen.png,        label: Pen,        source: "ms-fluent/Pen (MIT)" }
  - { key: T, mods: [], icon: text.png,       label: Text,       source: "ms-fluent/Text T (MIT)" }
  - { key: H, mods: [], icon: hand.png,       label: Hand,       source: "ms-fluent/Hand Right (MIT)" }
  - { key: C, mods: [], icon: comment.png,    label: Comment,    source: "ms-fluent/Comment (MIT)" }
  - { key: I, mods: [], icon: eyedropper.png, label: Eyedropper, source: "ms-fluent/Eyedropper (MIT)" }
  - { key: S, mods: [], icon: slice.png, mode: alpha, label: Slice, source: "custom (drawn: dashed export region)" }

  # --- edit (Ctrl -> R channel of primary) ---
  - { key: C, mods: [CTRL], icon: copy.png,      label: Copy,        source: "ms-fluent/Copy (MIT)" }
  - { key: X, mods: [CTRL], icon: cut.png,       label: Cut,         source: "ms-fluent/Cut (MIT)" }
  - { key: V, mods: [CTRL], icon: paste.png,     label: Paste,       source: "ms-fluent/Clipboard Paste (MIT)" }
  - { key: Z, mods: [CTRL], icon: undo.png,      label: Undo,        source: "ms-fluent/Arrow Undo (MIT)" }
  - { key: D, mods: [CTRL], icon: duplicate.png, label: Duplicate,   source: "ms-fluent/Document Copy (MIT)" }
  - { key: G, mods: [CTRL], icon: group.png,     label: Group,       source: "ms-fluent/Group (MIT)" }
  - { key: A, mods: [CTRL], icon: selectall.png, label: "Select all", source: "ms-fluent/Select All On (MIT)" }
  - { key: S, mods: [CTRL], icon: save.png,      label: Save,        source: "ms-fluent/Save (MIT)" }
  - { key: N, mods: [CTRL], icon: newfile.png,   label: "New file",  source: "ms-fluent/Document Add (MIT)" }
  - { key: R, mods: [CTRL], icon: rename.png,    label: Rename,      source: "ms-fluent/Rename (MIT)" }
  - { key: E, mods: [CTRL], icon: flatten.png,   label: Flatten,     source: "ms-fluent/Layer (MIT)" }
  - { key: F, mods: [CTRL], icon: find.png,      label: Find,        source: "ms-fluent/Search (MIT)" }
  - { key: B, mods: [CTRL], icon: bold.png,      label: Bold,        source: "ms-fluent/Text Bold (MIT)" }
  - { key: I, mods: [CTRL], icon: italic.png,    label: Italic,      source: "ms-fluent/Text Italic (MIT)" }
  - { key: U, mods: [CTRL], icon: underline.png, label: Underline,   source: "ms-fluent/Text Underline (MIT)" }

  # --- Shift -> B channel of primary ---
  - { key: P, mods: [SHIFT], icon: pencil.png,      label: Pencil,        source: "ms-fluent/Inking Tool (MIT)" }
  - { key: L, mods: [SHIFT], icon: arrowtool.png,   label: Arrow,         source: "ms-fluent/Arrow Up Right (MIT)" }
  - { key: R, mods: [SHIFT], icon: rulers.png,      label: Rulers,        source: "ms-fluent/Ruler (MIT)" }
  - { key: G, mods: [SHIFT], icon: grid.png,        label: "Layout grid", source: "ms-fluent/Grid (MIT)" }
  - { key: O, mods: [SHIFT], icon: outlineview.png, label: "Outline view", source: "ms-fluent/Eye Off (MIT)" }
  - { key: "1", mods: [SHIFT], icon: zoomfit.png,   label: "Zoom fit",    source: "ms-fluent/Full Screen Maximize (MIT)" }
  - { key: "2", mods: [SHIFT], icon: zoomsel.png,   label: "Zoom sel",    source: "ms-fluent/Select Object (MIT)" }

  # --- Ctrl+Shift -> R channel of combo ---
  - { key: G, mods: [CTRL, SHIFT], icon: ungroup.png,       label: Ungroup,        source: "ms-fluent/Group Dismiss (MIT)" }
  - { key: V, mods: [CTRL, SHIFT], icon: pasteover.png,     label: "Paste over",   source: "ms-fluent/Clipboard Paste (MIT)" }
  - { key: K, mods: [CTRL, SHIFT], icon: placeimage.png,    label: "Place image",  source: "ms-fluent/Image Add (MIT)" }
  - { key: O, mods: [CTRL, SHIFT], icon: outlinestroke.png, label: "Outline stroke", source: "ms-fluent/Pen Sparkle (MIT)" }
  - { key: E, mods: [CTRL, SHIFT], icon: export.png,        label: Export,         source: "ms-fluent/Arrow Export (MIT)" }
  - { key: C, mods: [CTRL, SHIFT], icon: copypng.png,       label: "Copy as PNG",  source: "ms-fluent/Image Copy (MIT)" }
  - { key: X, mods: [CTRL, SHIFT], icon: strikethrough.png, label: Strikethrough,  source: "ms-fluent/Text Strikethrough (MIT)" }

  # --- Ctrl+Alt -> G channel of combo ---
  - { key: G, mods: [CTRL, ALT], icon: frameselection.png, mode: alpha, label: "Frame sel", source: "custom (drawn: frame brackets + object)" }
  - { key: K, mods: [CTRL, ALT], icon: component.png,      label: Component,    source: "ms-fluent/Cube Add (MIT)" }
  - { key: B, mods: [CTRL, ALT], icon: detach.png,         label: "Detach inst", source: "ms-fluent/Plug Disconnected (MIT)" }
