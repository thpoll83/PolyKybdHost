# Microsoft Excel shortcut overlays for PolyKybd.
#
# Icons: Microsoft Fluent UI System Icons (MIT); % and $ are rendered as text
# (clearest for number-format shortcuts). Program icon (ESC): a generic drawn
# mark (no MS logo). Shortcuts: Excel defaults. See SOURCES.md.
#
# Regenerate:
#   python polyhost/res/overlay_sources/excel/fetch_icons.py
#   python scripts/generate_app_overlays.py \
#       polyhost/res/overlay_sources/excel/bindings.yaml --preview /tmp/excel_preview
app: excel
match: [excel]                # confirm vs the active-window name (excel / EXCEL.EXE)
output: excel_template
icon_dir: icons
fit: contain
anchor: bottom-right
region: [36, 32]
margin: 0
mode: luma
threshold: 150

program_icon: excel.png       # generic drawn mark (see fetch_icons._draw_excel_logo)
program_icon_mode: alpha
program_icon_anchor: bottom-right
program_icon_region: [46, 40]
program_icon_margin: 0

bindings:
  # --- file (Ctrl -> R channel of primary) ---
  - { key: N, mods: [CTRL], icon: new.png,   label: New,    source: "ms-fluent/Document Add (MIT)" }
  - { key: O, mods: [CTRL], icon: open.png,  label: Open,   source: "ms-fluent/Folder Open (MIT)" }
  - { key: S, mods: [CTRL], icon: save.png,  label: Save,   source: "ms-fluent/Save (MIT)" }
  - { key: P, mods: [CTRL], icon: print.png, label: Print,  source: "ms-fluent/Print (MIT)" }

  # --- edit (Ctrl) ---
  - { key: C, mods: [CTRL], icon: copy.png,      label: Copy,        source: "ms-fluent/Copy (MIT)" }
  - { key: X, mods: [CTRL], icon: cut.png,       label: Cut,         source: "ms-fluent/Cut (MIT)" }
  - { key: V, mods: [CTRL], icon: paste.png,     label: Paste,       source: "ms-fluent/Clipboard Paste (MIT)" }
  - { key: Z, mods: [CTRL], icon: undo.png,      label: Undo,        source: "ms-fluent/Arrow Undo (MIT)" }
  - { key: Y, mods: [CTRL], icon: redo.png,      label: Redo,        source: "ms-fluent/Arrow Redo (MIT)" }
  - { key: A, mods: [CTRL], icon: selectall.png, label: "Select all", source: "ms-fluent/Select All On (MIT)" }

  # --- format (Ctrl) ---
  - { key: B, mods: [CTRL], icon: bold.png,        label: Bold,      source: "ms-fluent/Text Bold (MIT)" }
  - { key: I, mods: [CTRL], icon: italic.png,      label: Italic,    source: "ms-fluent/Text Italic (MIT)" }
  - { key: U, mods: [CTRL], icon: underline.png,   label: Underline, source: "ms-fluent/Text Underline (MIT)" }
  - { key: K, mods: [CTRL], icon: hyperlink.png,   label: Hyperlink, source: "ms-fluent/Link (MIT)" }
  - { key: "1", mods: [CTRL], icon: formatcells.png, label: "Format cells", source: "ms-fluent/Table Settings (MIT)" }

  # --- search / nav (Ctrl) ---
  - { key: F, mods: [CTRL], icon: find.png,    label: Find,    source: "ms-fluent/Search (MIT)" }
  - { key: H, mods: [CTRL], icon: replace.png, label: Replace, source: "ms-fluent/Arrow Swap (MIT)" }
  - { key: G, mods: [CTRL], icon: goto.png,    label: "Go to", source: "ms-fluent/Target (MIT)" }

  # --- data / cells (Ctrl) ---
  - { key: W, mods: [CTRL], icon: close.png,      label: Close,        source: "ms-fluent/Document Dismiss (MIT)" }
  - { key: E, mods: [CTRL], icon: flashfill.png,  label: "Flash fill", source: "ms-fluent/Flash (MIT)" }
  - { key: T, mods: [CTRL], icon: tableadd.png,   label: "New table",  source: "ms-fluent/Table Add (MIT)" }
  - { key: L, mods: [CTRL], icon: table.png,      label: Table,        source: "ms-fluent/Table (MIT)" }
  - { key: MINUS, mods: [CTRL], icon: delcells.png,  label: "Delete cells", source: "ms-fluent/Table Delete Row (MIT)" }
  - { key: "]", mods: [CTRL], icon: dependents.png, label: Dependents,   source: "ms-fluent/Arrow Bidirectional Up Down (MIT)" }
  - { key: "[", mods: [CTRL], icon: precedents.png, label: Precedents,   source: "ms-fluent/Arrow Bidirectional Left Right (MIT)" }
  - { key: D, mods: [CTRL], icon: filldown.png,  label: "Fill down",  source: "ms-fluent/Arrow Down (MIT)" }
  - { key: R, mods: [CTRL], icon: fillright.png, label: "Fill right", source: "ms-fluent/Arrow Right (MIT)" }
  - { key: "5", mods: [CTRL], icon: strike.png,  label: Strikethrough, source: "ms-fluent/Text Strikethrough (MIT)" }

  # --- Alt -> G channel of primary ---
  - { key: EQUAL, mods: [ALT], icon: autosum.png, label: AutoSum, source: "ms-fluent/Math Formula (MIT)" }

  # --- Ctrl+Shift -> R channel of combo ---
  - { key: L, mods: [CTRL, SHIFT], icon: filter.png,   label: Filter,   source: "ms-fluent/Filter (MIT)" }
  - { key: "4", mods: [CTRL, SHIFT], icon: currency.png, label: Currency, source: "ms-fluent/Money (MIT)" }
  - { key: "5", mods: [CTRL, SHIFT], label: "%" }   # percent format — text symbol (clearest)

  # --- plain keys (no-mod -> A channel) ---
  - { key: F2,  mods: [], icon: edit.png,   label: "Edit cell", source: "ms-fluent/Edit (MIT)" }
  - { key: F4,  mods: [], icon: absref.png, label: "Abs ref",   source: "ms-fluent/Lock Closed (MIT)" }
  - { key: F9,  mods: [], icon: calc.png,   label: Calculate,   source: "ms-fluent/Calculator (MIT)" }
  - { key: F12, mods: [], icon: saveas.png, label: "Save as",   source: "ms-fluent/Save Edit (MIT)" }
