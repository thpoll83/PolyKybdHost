# Adobe Illustrator shortcut overlays for PolyKybd.
#
# Icons: Microsoft Fluent UI System Icons (MIT) where a clean glyph exists; a few
# vector-tool glyphs (pen, scissors, width, swap/default fill-stroke, line) are
# drawn white-on-transparent in fetch_icons.py and consumed with `mode: alpha`.
# Adobe's own icons are proprietary and are NOT used. Program mark (ESC) is a
# generic license-clean "Ai" monogram. Shortcuts: Illustrator defaults (SOURCES.md).
#
# A key's no-mod TOOL letter and its Ctrl MENU meaning coexist on the same cell in
# different channels (A vs R) - this is correct and intended.
#
# Regenerate:
#   python polyhost/res/overlay_sources/illustrator/fetch_icons.py
#   python scripts/generate_app_overlays.py \
#       polyhost/res/overlay_sources/illustrator/bindings.yaml --preview /tmp/illustrator_preview
app: illustrator
match: [illustrator]            # confirm vs the active-window name (illustrator / Illustrator.exe)
output: illustrator_template
icon_dir: icons
fit: contain
anchor: bottom-right
region: [36, 32]
margin: 0
mode: luma
threshold: 150

program_icon: illustrator.png        # generic drawn 'Ai' mark (see fetch_icons._draw_ai_logo)
program_icon_mode: alpha             # white-on-transparent drawing: alpha is the shape
program_icon_anchor: bottom-right
program_icon_region: [46, 40]
program_icon_margin: 0

bindings:
  # ===== Tools (no modifier -> A channel of primary) =====
  - { key: V, mods: [], icon: select.png,       label: Selection,        source: "ms-fluent/Cursor (MIT)" }
  - { key: A, mods: [], icon: directselect.png, label: "Direct select",  source: "ms-fluent/Select Object (MIT)" }
  - { key: Y, mods: [], icon: magicwand.png,    label: "Magic wand",     source: "ms-fluent/Wand (MIT)" }
  - { key: Q, mods: [], icon: lasso.png,        label: Lasso,            source: "ms-fluent/Lasso (MIT)" }
  - { key: P, mods: [], icon: pen.png, mode: alpha, label: Pen,          source: "custom (drawn: pen nib)" }
  - { key: T, mods: [], icon: type.png,         label: Type,             source: "ms-fluent/Text T (MIT)" }
  - { key: BACKSLASH, mods: [], icon: line.png, mode: alpha, label: "Line segment", source: "custom (drawn: line + nodes)" }
  - { key: M, mods: [], icon: rectangle.png,    label: Rectangle,        source: "ms-fluent/Rectangle Landscape (MIT)" }
  - { key: L, mods: [], icon: ellipse.png,      label: Ellipse,          source: "ms-fluent/Oval (MIT)" }
  - { key: B, mods: [], icon: paintbrush.png,   label: Paintbrush,       source: "ms-fluent/Paint Brush (MIT)" }
  - { key: N, mods: [], icon: pencil.png,       label: Pencil,           source: "ms-fluent/Edit (MIT)" }
  - { key: C, mods: [], icon: scissors.png, mode: alpha, label: Scissors, source: "custom (drawn: scissors)" }
  - { key: R, mods: [], icon: rotate.png,       label: Rotate,           source: "ms-fluent/Arrow Rotate Clockwise (MIT)" }
  - { key: O, mods: [], icon: reflect.png,      label: Reflect,          source: "ms-fluent/Flip Horizontal (MIT)" }
  - { key: S, mods: [], icon: scale.png,        label: Scale,            source: "ms-fluent/Resize (MIT)" }
  - { key: U, mods: [], icon: mesh.png,         label: Mesh,             source: "ms-fluent/Grid (MIT)" }
  - { key: G, mods: [], icon: gradient.png,     label: Gradient,         source: "ms-fluent/Color Line (MIT)" }
  - { key: I, mods: [], icon: eyedropper.png,   label: Eyedropper,       source: "ms-fluent/Eyedropper (MIT)" }
  - { key: K, mods: [], icon: livepaint.png,    label: "Live paint",     source: "ms-fluent/Paint Bucket (MIT)" }
  - { key: Z, mods: [], icon: zoom.png,         label: Zoom,             source: "ms-fluent/Zoom In (MIT)" }
  - { key: H, mods: [], icon: hand.png,         label: Hand,             source: "ms-fluent/Hand Right (MIT)" }
  - { key: E, mods: [], icon: eraser.png,       label: Eraser,           source: "ms-fluent/Eraser (MIT)" }
  - { key: X, mods: [], icon: swap.png, mode: alpha, label: "Swap fill/stroke", source: "custom (drawn: swap squares)" }
  - { key: D, mods: [], icon: default.png, mode: alpha, label: "Default fill/stroke", source: "custom (drawn: default swatch)" }

  # ===== File (Ctrl -> R channel of primary) =====
  - { key: N, mods: [CTRL], icon: new.png,    label: New,    source: "ms-fluent/Document Add (MIT)" }
  - { key: O, mods: [CTRL], icon: open.png,   label: Open,   source: "ms-fluent/Folder Open (MIT)" }
  - { key: S, mods: [CTRL], icon: save.png,   label: Save,   source: "ms-fluent/Save (MIT)" }
  - { key: P, mods: [CTRL], icon: print.png,  label: Print,  source: "ms-fluent/Print (MIT)" }

  # ===== Edit (Ctrl) =====
  - { key: Z, mods: [CTRL], icon: undo.png,      label: Undo,         source: "ms-fluent/Arrow Undo (MIT)" }
  - { key: C, mods: [CTRL], icon: copy.png,      label: Copy,         source: "ms-fluent/Copy (MIT)" }
  - { key: X, mods: [CTRL], icon: cut.png,       label: Cut,          source: "ms-fluent/Cut (MIT)" }
  - { key: V, mods: [CTRL], icon: paste.png,     label: Paste,        source: "ms-fluent/Clipboard Paste (MIT)" }
  - { key: A, mods: [CTRL], icon: selectall.png, label: "Select all", source: "ms-fluent/Select All On (MIT)" }
  - { key: D, mods: [CTRL], icon: transformagain.png, label: "Transform again", source: "ms-fluent/Arrow Repeat All (MIT)" }
  - { key: F, mods: [CTRL], icon: forward.png,   label: "Paste in front", source: "ms-fluent/Arrow Up (MIT)" }
  - { key: B, mods: [CTRL], icon: backward.png,  label: "Paste in back",  source: "ms-fluent/Arrow Down (MIT)" }

  # ===== Object (Ctrl) =====
  - { key: G, mods: [CTRL], icon: group.png,    label: Group,            source: "ms-fluent/Group (MIT)" }
  - { key: "2", mods: [CTRL], icon: lock.png,   label: Lock,             source: "ms-fluent/Lock Closed (MIT)" }
  - { key: "7", mods: [CTRL], icon: clipmask.png, label: "Clip mask",    source: "ms-fluent/Crop (MIT)" }
  - { key: "8", mods: [CTRL], icon: compound.png, label: "Compound path", source: "ms-fluent/Shape Subtract (MIT)" }
  - { key: "]", mods: [CTRL], icon: tofront.png, label: "Bring forward", source: "ms-fluent/Position To Front (MIT)" }
  - { key: "[", mods: [CTRL], icon: toback.png,  label: "Send backward", source: "ms-fluent/Position To Back (MIT)" }

  # ===== View (Ctrl) =====
  - { key: EQUAL, mods: [CTRL], icon: zoomin.png,  label: "Zoom in",  source: "ms-fluent/Zoom In (MIT)" }
  - { key: MINUS, mods: [CTRL], icon: zoomout.png, label: "Zoom out", source: "ms-fluent/Zoom Out (MIT)" }

  # ===== Ctrl+Shift -> R channel of combo =====
  - { key: S, mods: [CTRL, SHIFT], icon: saveas.png,   label: "Save as",         source: "ms-fluent/Save Edit (MIT)" }
  - { key: O, mods: [CTRL, SHIFT], icon: outlines.png, label: "Create outlines", source: "ms-fluent/Text Effects (MIT)" }
  - { key: G, mods: [CTRL, SHIFT], icon: ungroup.png,  label: Ungroup,           source: "ms-fluent/Group Dismiss (MIT)" }
  - { key: V, mods: [CTRL, SHIFT], icon: paste.png,    label: "Paste in place",  source: "ms-fluent/Clipboard Paste (MIT)" }
  - { key: P, mods: [CTRL, SHIFT], icon: place.png,    label: Place,             source: "ms-fluent/Image Add (MIT)" }
  - { key: "]", mods: [CTRL, SHIFT], icon: tofront.png, label: "Bring to front", source: "ms-fluent/Position To Front (MIT)" }
  - { key: "[", mods: [CTRL, SHIFT], icon: toback.png,  label: "Send to back",   source: "ms-fluent/Position To Back (MIT)" }

  # ===== Shift -> B channel of primary =====
  - { key: E, mods: [SHIFT], icon: scale.png,      label: "Free transform", source: "ms-fluent/Resize (MIT) - reused for transform" }
  - { key: W, mods: [SHIFT], icon: width.png, mode: alpha, label: "Width tool", source: "custom (drawn: variable width)" }
  - { key: B, mods: [SHIFT], icon: paintbrush.png, label: "Blob brush",     source: "ms-fluent/Paint Brush (MIT)" }
  - { key: L, mods: [SHIFT], icon: livepaint.png,  label: "Live paint select", source: "ms-fluent/Paint Bucket (MIT)" }
