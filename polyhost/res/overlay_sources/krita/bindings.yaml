# Krita shortcut overlays for PolyKybd.
#
# Icons: Microsoft Fluent UI System Icons (MIT) for most actions; a few painting
# glyphs (brush-size +/-, switch-preset) and the program mark are drawn in code
# (white-on-transparent, mode: alpha). Krita's own icons are GPLv3 and are NOT
# bundled (host is GPL-2.0). See SOURCES.md.
#
# Shortcuts: Krita default key bindings (STABLE GLOBAL set). Verified against the
# Krita docs / KDE Community Wiki — see SOURCES.md. Actions with no confirmed
# default (Print, Reset-zoom, Wrap-around, color sampler) are intentionally
# dropped, not invented.
#
# Regenerate:
#   python polyhost/res/overlay_sources/krita/fetch_icons.py
#   python scripts/generate_app_overlays.py \
#       polyhost/res/overlay_sources/krita/bindings.yaml --preview /tmp/krita_preview
app: krita
match: [krita]                 # confirm vs the active-window name (krita / krita.exe)
output: krita_template
icon_dir: icons
fit: contain
anchor: bottom-right
region: [36, 32]
margin: 0
mode: luma
threshold: 150

program_icon: krita.png          # generic drawn "Kr" monogram (see fetch_icons._draw_krita_logo)
program_icon_mode: alpha          # white-on-transparent drawing: alpha is the shape
program_icon_anchor: bottom-right
program_icon_region: [46, 40]
program_icon_margin: 0

bindings:
  # --- file (Ctrl -> R channel of primary) ---
  - { key: N, mods: [CTRL], icon: new.png,   label: New,    source: "ms-fluent/Document Add (MIT)" }
  - { key: O, mods: [CTRL], icon: open.png,  label: Open,   source: "ms-fluent/Folder Open (MIT)" }
  - { key: S, mods: [CTRL], icon: save.png,  label: Save,   source: "ms-fluent/Save (MIT)" }
  - { key: W, mods: [CTRL], icon: close.png, label: Close,  source: "ms-fluent/Document Dismiss (MIT)" }

  # --- edit (Ctrl) ---
  - { key: Z, mods: [CTRL], icon: undo.png,      label: Undo,         source: "ms-fluent/Arrow Undo (MIT)" }
  - { key: C, mods: [CTRL], icon: copy.png,      label: Copy,         source: "ms-fluent/Copy (MIT)" }
  - { key: X, mods: [CTRL], icon: cut.png,       label: Cut,          source: "ms-fluent/Cut (MIT)" }
  - { key: V, mods: [CTRL], icon: paste.png,     label: Paste,        source: "ms-fluent/Clipboard Paste (MIT)" }
  - { key: A, mods: [CTRL], icon: selectall.png, label: "Select all", source: "ms-fluent/Select All On (MIT)" }
  - { key: T, mods: [CTRL], icon: transform.png, label: Transform,    source: "ms-fluent/Resize (MIT)" }
  - { key: E, mods: [CTRL], icon: mergedown.png, label: "Merge down", source: "ms-fluent/Layer (MIT)" }
  - { key: G, mods: [CTRL], icon: group.png,     label: "Group",      source: "ms-fluent/Group (MIT)" }

  # --- Ctrl+Shift -> R channel of combo ---
  - { key: Z, mods: [CTRL, SHIFT], icon: redo.png,       label: Redo,             source: "ms-fluent/Arrow Redo (MIT)" }
  - { key: S, mods: [CTRL, SHIFT], icon: saveas.png,     label: "Save as",        source: "ms-fluent/Save Edit (MIT)" }
  - { key: A, mods: [CTRL, SHIFT], icon: deselect.png,   label: Deselect,         source: "ms-fluent/Select All Off (MIT)" }
  - { key: I, mods: [CTRL, SHIFT], icon: invertsel.png,  label: "Invert sel",     source: "ms-fluent/Square Hint (MIT)" }
  - { key: C, mods: [CTRL, SHIFT], icon: copymerged.png, label: "Copy merged",    source: "ms-fluent/Layer Diagonal (MIT)" }
  - { key: E, mods: [CTRL, SHIFT], icon: flatten.png,    label: "Flatten image",  source: "ms-fluent/Group List (MIT)" }

  # --- plain keys / tools (no-mod -> A channel) ---
  - { key: B, mods: [], icon: brush.png,    label: "Brush",     source: "ms-fluent/Inking Tool (MIT)" }
  - { key: E, mods: [], icon: eraser.png,   label: "Eraser",    source: "ms-fluent/Eraser (MIT)" }
  - { key: M, mods: [], icon: mirror.png,   label: "Mirror view", source: "ms-fluent/Flip Horizontal (MIT)" }
  - { key: "/", mods: [], icon: preset.png, mode: alpha, label: "Prev preset", source: "custom (drawn: two swatches + swap arrow)" }
  - { key: "[", mods: [], icon: brushdec.png, mode: alpha, label: "Brush -", source: "custom (drawn: small dot)" }
  - { key: "]", mods: [], icon: brushinc.png, mode: alpha, label: "Brush +", source: "custom (drawn: large dot)" }
  - { key: "1", mods: [], icon: zoom100.png,  label: "Zoom 100%", source: "ms-fluent/Ratio One To One (MIT)" }
  - { key: "2", mods: [], icon: fitpage.png,  label: "Fit page",  source: "ms-fluent/Resize (MIT)" }
  - { key: "3", mods: [], icon: fitwidth.png, label: "Fit width", source: "ms-fluent/Arrow Autofit Width (MIT)" }
