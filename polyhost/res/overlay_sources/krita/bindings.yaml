# Krita shortcut overlays for PolyKybd.
#
# Icons: KDE Breeze icons (LGPLv3) — the set Krita's own UI uses — for the action/
# tool keys; one Fluent (MIT) holdout (copy-merged); a few painting glyphs
# (brush-size +/-, switch-preset) + the program mark are drawn in code
# (mode: alpha). Breeze is license-compatible since the host is GPL-3.0-or-later.
# See SOURCES.md.
#
# Shortcuts: Krita default key bindings (STABLE GLOBAL set). Verified against the
# Krita docs / KDE Community Wiki — see SOURCES.md. Actions with no confirmed
# default (Print, Reset-zoom, Wrap-around, color sampler) are intentionally
# dropped, not invented.
#
# Regenerate:
#   python polyhost/res/overlay_sources/krita/fetch_icons.py
#   python scripts/generate_app_overlays.py \
#       polyhost/res/overlay_sources/krita/bindings.yaml --preview /tmp/krita_preview
app: krita
match: [krita]                 # confirm vs the active-window name (krita / krita.exe)
output: krita_template
icon_dir: icons
fit: contain
anchor: bottom-right
region: [36, 32]
margin: 0
mode: luma
threshold: 150

program_icon: krita.png          # generic drawn "Kr" monogram (see fetch_icons._draw_krita_logo)
program_icon_mode: alpha          # white-on-transparent drawing: alpha is the shape
program_icon_anchor: bottom-right
program_icon_region: [46, 40]
program_icon_margin: 0

bindings:
  # --- file (Ctrl -> R channel of primary) ---
  - { key: N, mods: [CTRL], icon: new.png,   label: New,    source: "breeze-icons/document-new (LGPLv3)" }
  - { key: O, mods: [CTRL], icon: open.png,  label: Open,   source: "breeze-icons/document-open (LGPLv3)" }
  - { key: S, mods: [CTRL], icon: save.png,  label: Save,   source: "breeze-icons/document-save (LGPLv3)" }
  - { key: W, mods: [CTRL], icon: close.png, label: Close,  source: "breeze-icons/document-close (LGPLv3)" }

  # --- edit (Ctrl) ---
  - { key: Z, mods: [CTRL], icon: undo.png,      label: Undo,         source: "breeze-icons/edit-undo (LGPLv3)" }
  - { key: C, mods: [CTRL], icon: copy.png,      label: Copy,         source: "breeze-icons/edit-copy (LGPLv3)" }
  - { key: X, mods: [CTRL], icon: cut.png,       label: Cut,          source: "breeze-icons/edit-cut (LGPLv3)" }
  - { key: V, mods: [CTRL], icon: paste.png,     label: Paste,        source: "breeze-icons/edit-paste (LGPLv3)" }
  - { key: A, mods: [CTRL], icon: selectall.png, label: "Select all", source: "breeze-icons/edit-select-all (LGPLv3)" }
  - { key: T, mods: [CTRL], icon: transform.png, label: Transform,    source: "breeze-icons/transform-scale (LGPLv3)" }
  - { key: E, mods: [CTRL], icon: mergedown.png, label: "Merge down", source: "breeze-icons/layer-bottom (LGPLv3)" }
  - { key: G, mods: [CTRL], icon: group.png,     label: "Group",      source: "breeze-icons/object-group (LGPLv3)" }

  # --- Ctrl+Shift -> R channel of combo ---
  - { key: Z, mods: [CTRL, SHIFT], icon: redo.png,       label: Redo,             source: "breeze-icons/edit-redo (LGPLv3)" }
  - { key: S, mods: [CTRL, SHIFT], icon: saveas.png,     label: "Save as",        source: "breeze-icons/document-save-as (LGPLv3)" }
  - { key: A, mods: [CTRL, SHIFT], icon: deselect.png,   label: Deselect,         source: "breeze-icons/edit-select-none (LGPLv3)" }
  - { key: I, mods: [CTRL, SHIFT], icon: invertsel.png,  label: "Invert sel",     source: "breeze-icons/edit-select-invert (LGPLv3)" }
  - { key: C, mods: [CTRL, SHIFT], icon: copymerged.png, label: "Copy merged",    source: "ms-fluent/Layer Diagonal (MIT) — no readable Breeze glyph" }
  - { key: E, mods: [CTRL, SHIFT], icon: flatten.png,    label: "Flatten image",  source: "breeze-icons/layer-visible-on (LGPLv3)" }

  # --- plain keys / tools (no-mod -> A channel) ---
  - { key: B, mods: [], icon: brush.png,    label: "Brush",     source: "breeze-icons/draw-brush (LGPLv3)" }
  - { key: E, mods: [], icon: eraser.png,   label: "Eraser",    source: "breeze-icons/draw-eraser (LGPLv3)" }
  - { key: M, mods: [], icon: mirror.png,   label: "Mirror view", source: "breeze-icons/object-flip-horizontal (LGPLv3)" }
  - { key: "/", mods: [], icon: preset.png, mode: alpha, label: "Prev preset", source: "custom (drawn: two swatches + swap arrow)" }
  - { key: "[", mods: [], icon: brushdec.png, mode: alpha, label: "Brush -", source: "custom (drawn: small dot)" }
  - { key: "]", mods: [], icon: brushinc.png, mode: alpha, label: "Brush +", source: "custom (drawn: large dot)" }
  - { key: "1", mods: [], icon: zoom100.png,  label: "Zoom 100%", source: "breeze-icons/zoom-original (LGPLv3)" }
  - { key: "2", mods: [], icon: fitpage.png,  label: "Fit page",  source: "breeze-icons/zoom-fit-best (LGPLv3)" }
  - { key: "3", mods: [], icon: fitwidth.png, label: "Fit width", source: "breeze-icons/zoom-fit-width (LGPLv3)" }

  # --- added tools (coverage audit 2026-06) ---
  - { key: F, mods: [], icon: filltool.png,   label: "Fill tool",    source: "breeze-icons/fill-color (LGPLv3)" }
  - { key: T, mods: [], icon: move.png,       label: "Move tool",    source: "breeze-icons/transform-move (LGPLv3)" }
  - { key: P, mods: [], icon: picker.png,     label: "Color picker", source: "breeze-icons/color-picker (LGPLv3)" }
  - { key: R, mods: [], icon: rectselect.png, label: "Rect select",  source: "breeze-icons/select-rectangular (LGPLv3)" }
  - { key: V, mods: [], icon: linetool.png,   label: "Line tool",    source: "breeze-icons/draw-line (LGPLv3)" }
  - { key: R, mods: [SHIFT], icon: rectangle.png, label: "Rectangle", source: "breeze-icons/draw-rectangle (LGPLv3)" }
  - { key: J, mods: [SHIFT], icon: ellipse.png,   label: "Ellipse",   source: "breeze-icons/draw-ellipse (LGPLv3)" }
  - { key: BACKSPACE, mods: [],      icon: fillbg.png, mode: alpha, label: "Fill BG color", source: "custom (drawn: solid square)" }
  - { key: BACKSPACE, mods: [SHIFT], icon: fillfg.png, mode: alpha, label: "Fill FG color", source: "custom (drawn: framed square)" }
  - { key: I, mods: [CTRL], icon: invert.png, mode: alpha, label: "Invert", source: "custom (drawn: half-filled circle)" }
  - { key: D, mods: [CTRL, SHIFT], icon: reselect.png, mode: alpha, label: "Reselect", source: "custom (drawn: dashed box + arrow)" }
  - { key: INSERT, mods: [], icon: newlayer.png, label: "New layer", source: "breeze-icons/list-add (LGPLv3)" }
