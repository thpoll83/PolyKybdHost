# Notepad++ shortcut overlays for PolyKybd.
#
# Icons: Microsoft Fluent UI System Icons (MIT) for all shortcuts (one consistent
# style, license-clean vs the GPL-3.0-or-later host); one custom-drawn glyph (delete line).
# Program icon (ESC, all layers): the actual Notepad++ logo. See SOURCES.md.
# Shortcuts: Notepad++ default keymap.
#
# Regenerate:
#   python polyhost/res/overlay_sources/notepadpp/fetch_icons.py
#   python scripts/generate_app_overlays.py \
#       polyhost/res/overlay_sources/notepadpp/bindings.yaml --preview /tmp/npp_preview
app: notepad++
match: [notepad++]
output: notepadpp_template
icon_dir: icons
fit: contain
anchor: bottom-right
region: [40, 36]
margin: 0
mode: luma
threshold: 150

# Program icon drawn into the ESC cell on every layer (all channels) as a marker
# of which overlay set is loaded.
program_icon: npp.png
program_icon_mode: luma
program_icon_anchor: right
program_icon_region: [42, 34]   # a bit smaller than the cell, hard right edge
program_icon_margin: 0
program_icon_threshold: 170

bindings:
  # --- file (Ctrl -> R channel of primary) ---
  - { key: N, mods: [CTRL], icon: new.png,     label: New,    source: "ms-fluent/Document Add (MIT)" }
  - { key: O, mods: [CTRL], icon: open.png,    label: Open,   source: "ms-fluent/Folder Open (MIT)" }
  - { key: S, mods: [CTRL], icon: save.png,    label: Save,   source: "ms-fluent/Save (MIT)" }
  - { key: P, mods: [CTRL], icon: print.png,   label: Print,  source: "ms-fluent/Print (MIT)" }
  - { key: W, mods: [CTRL], icon: close.png,   label: Close,  source: "ms-fluent/Document Dismiss (MIT)" }

  # --- edit (Ctrl) ---
  - { key: C, mods: [CTRL], icon: copy.png,       label: Copy,        source: "ms-fluent/Copy (MIT)" }
  - { key: X, mods: [CTRL], icon: cut.png,        label: Cut,         source: "ms-fluent/Cut (MIT)" }
  - { key: V, mods: [CTRL], icon: paste.png,      label: Paste,       source: "ms-fluent/Clipboard Paste (MIT)" }
  - { key: Z, mods: [CTRL], icon: undo.png,       label: Undo,        source: "ms-fluent/Arrow Undo (MIT)" }
  - { key: Y, mods: [CTRL], icon: redo.png,       label: Redo,        source: "ms-fluent/Arrow Redo (MIT)" }
  - { key: A, mods: [CTRL], icon: selectall.png,  label: "Select all", source: "ms-fluent/Select All On (MIT)" }
  - { key: D, mods: [CTRL], icon: duplicate.png,  label: "Dup line",  source: "ms-fluent/Row Triple (MIT)" }
  - { key: L, mods: [CTRL], icon: deleteline.png, label: "Del line",  mode: alpha, source: "custom (drawn: text rows + strike)" }
  - { key: Q, mods: [CTRL], icon: comment.png,    label: Comment,     source: "ms-fluent/Comment (MIT)" }
  - { key: I, mods: [CTRL], icon: split.png,      label: "Split lines", source: "ms-fluent/Split Horizontal (MIT)" }
  - { key: T, mods: [CTRL], icon: swapline.png,   label: "Swap line",  source: "ms-fluent/Arrow Sort Up (MIT)" }
  - { key: J, mods: [CTRL], icon: join.png,        label: "Join lines", source: "ms-fluent/Text Wrap Off (MIT)" }
  - { key: B, mods: [CTRL], icon: braces.png,      label: "Match brace", source: "ms-fluent/Braces (MIT)" }
  - { key: U, mods: [CTRL], icon: lowercase.png,   label: Lowercase,    source: "ms-fluent/Text Case Lowercase (MIT)" }
  - { key: M, mods: [CTRL], icon: mark.png,        label: Mark,         source: "ms-fluent/Highlight (MIT) [custom: Mark dialog]" }
  - { key: "[", mods: [CTRL], icon: top.png,       label: "First line", source: "ms-fluent/Arrow Circle Up (MIT) [custom: go to top]" }
  - { key: "]", mods: [CTRL], icon: bottom.png,    label: "Last line",  source: "ms-fluent/Arrow Square Down (MIT) [custom: go to bottom]" }
  - { key: "\\", mods: [CTRL], icon: nextword.png, label: "Next word",  source: "ms-fluent/Arrow Right (MIT) [custom: next word]" }

  # --- search (Ctrl) ---
  - { key: F, mods: [CTRL], icon: find.png,    label: Find,    source: "ms-fluent/Search (MIT)" }
  - { key: H, mods: [CTRL], icon: replace.png, label: Replace, source: "ms-fluent/Arrow Swap (MIT)" }
  - { key: G, mods: [CTRL], icon: goto.png,    label: "Go to", source: "ms-fluent/Arrow Down (MIT)" }
  - { key: F3, mods: [],    icon: findnext.png, label: "Find next", source: "ms-fluent/Chevron Right (MIT)" }

  # --- combos: Ctrl+Shift -> R channel of the combo PNG ---
  - { key: S, mods: [CTRL, SHIFT], icon: saveall.png,   label: "Save all",   source: "ms-fluent/Save Multiple (MIT)" }
  - { key: F, mods: [CTRL, SHIFT], icon: findfiles.png, label: "Find files", source: "ms-fluent/Document Search (MIT)" }

  # --- run (plain F-key) ---
  - { key: F5, mods: [], icon: run.png, label: Run, source: "ms-fluent/Play (MIT)" }
