# Microsoft Word shortcut overlays for PolyKybd.
#
# Icons: Microsoft Fluent UI System Icons (MIT). Program icon (ESC): a Fluent
# document placeholder (drop a real Word logo as icons/word.png to override).
# Shortcuts: Word defaults. See SOURCES.md.
#
# Regenerate:
#   python polyhost/res/overlay_sources/word/fetch_icons.py
#   python scripts/generate_app_overlays.py \
#       polyhost/res/overlay_sources/word/bindings.yaml --preview /tmp/word_preview
app: winword
match: [winword]              # confirm vs the active-window name (winword / WINWORD.EXE)
output: word_template
icon_dir: icons
fit: contain
anchor: bottom-right
region: [36, 32]
margin: 0
mode: luma
threshold: 150

program_icon: word.png          # generic drawn mark (see fetch_icons._draw_word_logo)
program_icon_mode: alpha         # white-on-transparent drawing: alpha is the shape
program_icon_anchor: bottom-right
program_icon_region: [46, 40]
program_icon_margin: 0

bindings:
  # --- file (Ctrl -> R channel of primary) ---
  - { key: N, mods: [CTRL], icon: new.png,   label: New,    source: "ms-fluent/Document Add (MIT)" }
  - { key: O, mods: [CTRL], icon: open.png,  label: Open,   source: "ms-fluent/Folder Open (MIT)" }
  - { key: S, mods: [CTRL], icon: save.png,  label: Save,   source: "ms-fluent/Save (MIT)" }
  - { key: P, mods: [CTRL], icon: print.png, label: Print,  source: "ms-fluent/Print (MIT)" }

  # --- edit (Ctrl) ---
  - { key: C, mods: [CTRL], icon: copy.png,      label: Copy,        source: "ms-fluent/Copy (MIT)" }
  - { key: X, mods: [CTRL], icon: cut.png,       label: Cut,         source: "ms-fluent/Cut (MIT)" }
  - { key: V, mods: [CTRL], icon: paste.png,     label: Paste,       source: "ms-fluent/Clipboard Paste (MIT)" }
  - { key: Z, mods: [CTRL], icon: undo.png,      label: Undo,        source: "ms-fluent/Arrow Undo (MIT)" }
  - { key: Y, mods: [CTRL], icon: redo.png,      label: Redo,        source: "ms-fluent/Arrow Redo (MIT)" }
  - { key: A, mods: [CTRL], icon: selectall.png, label: "Select all", source: "ms-fluent/Select All On (MIT)" }

  # --- format (Ctrl) ---
  - { key: B, mods: [CTRL], icon: bold.png,      label: Bold,      source: "ms-fluent/Text Bold (MIT)" }
  - { key: I, mods: [CTRL], icon: italic.png,    label: Italic,    source: "ms-fluent/Text Italic (MIT)" }
  - { key: U, mods: [CTRL], icon: underline.png, label: Underline, source: "ms-fluent/Text Underline (MIT)" }
  - { key: D, mods: [CTRL], icon: font.png,      label: "Font dialog", source: "ms-fluent/Text Font (MIT)" }
  - { key: K, mods: [CTRL], icon: hyperlink.png, label: Hyperlink, source: "ms-fluent/Link (MIT)" }
  - { key: M, mods: [CTRL], icon: indent.png,    label: Indent,    source: "ms-fluent/Text Indent Increase (MIT)" }
  - { key: W, mods: [CTRL], icon: close.png,     label: Close,     source: "ms-fluent/Document Dismiss (MIT)" }
  - { key: "[", mods: [CTRL], icon: fontdec.png, label: "Font -",  source: "ms-fluent/Font Decrease (MIT)" }
  - { key: "]", mods: [CTRL], icon: fontinc.png, label: "Font +",  source: "ms-fluent/Font Increase (MIT)" }
  - { key: EQUAL, mods: [CTRL], icon: subscript.png, label: Subscript, source: "ms-fluent/Text Subscript (MIT)" }
  - { key: MINUS, mods: [CTRL], icon: hyphen.png, label: "Opt hyphen", source: "ms-fluent/Subtract (MIT)" }
  - { key: T, mods: [CTRL], icon: hangindent.png, mode: alpha, label: "Hang indent", source: "custom (drawn: first line flush, rest indented)" }
  - { key: Q, mods: [CTRL], icon: clearfmt.png, label: "Clear fmt",   source: "ms-fluent/Text Clear Formatting (MIT)" }
  - { key: "1", mods: [CTRL], icon: linespacing1.png,  mode: alpha, region: [38, 34], label: "Line 1.0", source: "composed (1 + line-spacing)" }
  - { key: "2", mods: [CTRL], icon: linespacing2.png,  mode: alpha, region: [38, 34], label: "Line 2.0", source: "composed (2 + line-spacing)" }
  - { key: "5", mods: [CTRL], icon: linespacing15.png, mode: alpha, region: [38, 34], label: "Line 1.5", source: "composed (1½ + line-spacing)" }

  # --- align (Ctrl) ---
  - { key: L, mods: [CTRL], icon: left.png,    label: "Align left",  source: "ms-fluent/Text Align Left (MIT)" }
  - { key: E, mods: [CTRL], icon: center.png,  label: "Align center", source: "ms-fluent/Text Align Center (MIT)" }
  - { key: R, mods: [CTRL], icon: right.png,   label: "Align right", source: "ms-fluent/Text Align Right (MIT)" }
  - { key: J, mods: [CTRL], icon: justify.png, label: Justify,       source: "ms-fluent/Text Align Justify (MIT)" }

  # --- search / nav (Ctrl) ---
  - { key: F, mods: [CTRL], icon: find.png,    label: Find,    source: "ms-fluent/Search (MIT)" }
  - { key: H, mods: [CTRL], icon: replace.png, label: Replace, source: "ms-fluent/Arrow Swap (MIT)" }
  - { key: G, mods: [CTRL], icon: goto.png,    label: "Go to", source: "ms-fluent/Arrow Down (MIT)" }

  # --- Shift -> B channel of primary ---
  - { key: F3, mods: [SHIFT], icon: changecase.png, label: "Change case", source: "ms-fluent/Text Change Case (MIT)" }

  # --- Ctrl+Shift -> R channel of combo ---
  - { key: C, mods: [CTRL, SHIFT], icon: copyformat.png, label: "Copy format", source: "ms-fluent/Paint Brush (MIT)" }
  - { key: L, mods: [CTRL, SHIFT], icon: bullets.png,    label: "Bullet list", source: "ms-fluent/Text Bullet List (MIT)" }

  # --- plain keys (no-mod -> A channel) ---
  - { key: F7, mods: [], icon: spelling.png, label: Spelling, source: "ms-fluent/Text Grammar Checkmark (MIT)" }
  - { key: F12, mods: [], icon: saveas.png,  label: "Save as", source: "ms-fluent/Save Edit (MIT)" }
