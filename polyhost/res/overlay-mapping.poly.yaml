chrome,google-chrome,chromium,brave,brave-browser,msedge,microsoft-edge,vivaldi,opera,arc:
  overlay: [chrome_template.mods.png, chrome_template.combo.mods.png]
  # urls-contains matches on the focused tab's URL (needs the browser extension
  # or, on macOS, the AppleScript fallback — see settings `browser_url_detection`
  # and browser-extension/README.md). A URL identifies a web-app far more
  # reliably than its window title, so these win over titles-contains below;
  # both are kept, so the title match still works when no URL is available.
  urls-contains:
    miro.com:
      overlay: miro_template.mods.png
    outlook.office.com:
      overlay: web_outlook_template.mods.png
    outlook.live.com:
      overlay: web_outlook_template.mods.png
    atlassian.net:
      overlay: jira_template.mods.png
  titles-startswith:
    Pull:
      overlay: bitbucket_pr_template.mods.png
  titles-endswith:
  titles-contains:
    Miro:
      overlay: miro_template.mods.png
    Outlook:
      overlay: web_outlook_template.mods.png
    Jira:
      overlay: jira_template.mods.png
